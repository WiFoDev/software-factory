name: publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-pnpm
        uses: pnpm/action-setup@v4

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # bun is required for `pnpm test` (every package's test script runs
      # `bun test`) AND for `packages/core`'s build (which runs
      # `bun run scripts/emit-json-schema.ts` after tsc).
      - name: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        run: pnpm install --frozen-lockfile

      # Build must run before typecheck/test/check so cross-package
      # type resolution (e.g., harness importing @wifo/factory-core)
      # finds the workspace-linked `dist/` from a fresh checkout.
      # Explicit per-package order: pnpm treats `peerDependencies` as
      # cycle edges, so the v0.0.13 move of `@wifo/factory-spec-review`
      # to peerDeps of `@wifo/factory-core` did NOT eliminate the
      # workspace cycle from pnpm's POV (only the runtime install
      # semantic improved). `pnpm -r build` still parallelizes across
      # the cycle and races; explicit sequencing sidesteps it.
      - name: build
        run: |
          set -e
          pnpm --filter @wifo/factory-context build
          pnpm --filter @wifo/factory-twin build
          pnpm --filter @wifo/factory-core build
          pnpm --filter @wifo/factory-harness build
          pnpm --filter @wifo/factory-spec-review build
          pnpm --filter @wifo/factory-runtime build

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test

      - name: check
        run: pnpm check

      - name: publish
        # Idempotent per-package publish via npm Trusted Publishing (OIDC).
        # The `permissions: id-token: write` block at the workflow level
        # provides ACTIONS_ID_TOKEN_REQUEST_{URL,TOKEN} env vars; npm CLI
        # reads them to mint an OIDC token and exchange it with npm's
        # registry. npm verifies the token's claims against each package's
        # "Trusted Publishers" config on npmjs.com — no long-lived
        # NPM_TOKEN secret. See RELEASING.md for the per-package setup.
        #
        # Uses `npm publish` directly (not `pnpm publish`) because pnpm's
        # bundled publish logic doesn't reliably forward the OIDC env to
        # the underlying npm CLI. Each package is published from its own
        # directory; the dist/ artifacts were built earlier in the job.
        #
        # `--provenance` opts into sigstore attestations alongside the
        # publish — required for Trusted Publishing AND visible on the
        # package's npm page as a verifiable provenance link.
        #
        # Per-package skip-if-already-published guard makes re-tagging
        # safe (e.g., for GitHub Releases page hygiene after a partial
        # publish). The publish step runs once per package whose local
        # version differs from npm's.
        run: |
          set -e
          published=0
          skipped=0
          for pkg_dir in packages/*/; do
            name=$(jq -r '.name' "${pkg_dir}package.json")
            local_version=$(jq -r '.version' "${pkg_dir}package.json")
            remote_version=$(npm view "$name" version 2>/dev/null || echo "0.0.0")
            if [ "$local_version" != "$remote_version" ]; then
              echo "::notice::Publishing $name@$local_version (registry was at $remote_version) via Trusted Publishing"
              # `npx -y npm@latest` runs a recent npm CLI without the
              # `npm install -g npm@latest` self-upgrade bug (where
              # promise-retry resolves against the in-progress install).
              # npm 11.5+ has native Trusted Publishing OIDC support.
              (cd "$pkg_dir" && npx -y npm@latest publish --access public --provenance)
              published=$((published + 1))
            else
              echo "::notice::Skipping $name@$local_version (already on npm)"
              skipped=$((skipped + 1))
            fi
          done
          echo "::notice::publish summary — published=$published skipped=$skipped"
