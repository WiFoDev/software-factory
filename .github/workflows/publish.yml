name: publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-pnpm
        uses: pnpm/action-setup@v4

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # bun is required for `pnpm test` (every package's test script runs
      # `bun test`) AND for `packages/core`'s build (which runs
      # `bun run scripts/emit-json-schema.ts` after tsc).
      - name: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        run: pnpm install --frozen-lockfile

      # Build must run before typecheck/test/check so cross-package
      # type resolution (e.g., harness importing @wifo/factory-core)
      # finds the workspace-linked `dist/` from a fresh checkout.
      # Explicit per-package order: pnpm treats `peerDependencies` as
      # cycle edges, so the v0.0.13 move of `@wifo/factory-spec-review`
      # to peerDeps of `@wifo/factory-core` did NOT eliminate the
      # workspace cycle from pnpm's POV (only the runtime install
      # semantic improved). `pnpm -r build` still parallelizes across
      # the cycle and races; explicit sequencing sidesteps it.
      - name: build
        run: |
          set -e
          pnpm --filter @wifo/factory-context build
          pnpm --filter @wifo/factory-twin build
          pnpm --filter @wifo/factory-core build
          pnpm --filter @wifo/factory-harness build
          pnpm --filter @wifo/factory-spec-review build
          pnpm --filter @wifo/factory-runtime build

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test

      - name: check
        run: pnpm check

      - name: publish
        # Two-step per-package publish: `pnpm pack` rewrites workspace:* →
        # real semver in the tarball's package.json (purpose-built for the
        # transformation); `npm publish <tarball>` uploads via npm Trusted
        # Publishing OIDC (purpose-built for the auth handshake). Splitting
        # the responsibilities across the right tools fixes the v0.0.13
        # regression where `npm publish` (without pnpm's rewrite) shipped
        # `workspace:*` to npm — every fresh `npx @wifo/factory-core init`
        # consumer hit EUNSUPPORTEDPROTOCOL.
        #
        # OIDC: the workflow-level `permissions: id-token: write` provides
        # ACTIONS_ID_TOKEN_REQUEST_{URL,TOKEN} env vars; npm CLI reads them
        # to mint a short-lived token verified against each package's
        # Trusted Publishers config on npmjs.com. No NPM_TOKEN secret.
        # `--provenance` opts into sigstore attestations (required by
        # Trusted Publishing). `npx -y npm@latest` sidesteps the
        # `npm install -g npm@latest` self-upgrade bug.
        #
        # Per-package skip-if-already-published guard via `npm view ...
        # version` makes re-tagging safe (e.g., GitHub Releases hygiene
        # after a partial publish). Post-publish verification re-fetches
        # each just-published manifest and fails the workflow if any
        # `workspace:` substring leaked through — regression-pin against
        # future shape regressions.
        run: |
          set -e
          mkdir -p /tmp/factory-tarballs
          published=0
          skipped=0
          published_pkgs=()
          for pkg_dir in packages/*/; do
            name=$(jq -r '.name' "${pkg_dir}package.json")
            local_version=$(jq -r '.version' "${pkg_dir}package.json")
            remote_version=$(npm view "$name" version 2>/dev/null || echo "0.0.0")
            if [ "$local_version" != "$remote_version" ]; then
              echo "::notice::Publishing $name@$local_version (registry was at $remote_version) via Trusted Publishing"
              pnpm pack --pack-destination /tmp/factory-tarballs --filter "$name"
              tarball="/tmp/factory-tarballs/$(echo "$name" | sed 's|^@||; s|/|-|g')-${local_version}.tgz"
              npx -y npm@latest publish "$tarball" --access public --provenance
              published=$((published + 1))
              published_pkgs+=("$name@$local_version")
            else
              echo "::notice::Skipping $name@$local_version (already on npm)"
              skipped=$((skipped + 1))
            fi
          done
          echo "::notice::publish summary — published=$published skipped=$skipped"

          # Post-publish verification — re-fetch each just-published
          # manifest from npm and grep for the `workspace:` substring in
          # the dependency surface. If any leak through, fail the workflow
          # so the next release ships the fix before users hit it.
          #
          # Retry-with-backoff handles npm CDN propagation lag — a fresh
          # publish can take 5-30s before `npm view <pkg>@<version>` can
          # see it. Without retry, the verification false-fails on the
          # very-recently-published version it just produced.
          for entry in "${published_pkgs[@]}"; do
            manifest=""
            for attempt in 1 2 3 4 5 6; do
              if manifest=$(npm view "$entry" dependencies peerDependencies --json 2>/dev/null) && [ -n "$manifest" ]; then
                break
              fi
              echo "::notice::$entry not yet visible on npm (attempt $attempt/6) — backing off ${attempt}0s"
              sleep $((attempt * 10))
            done
            if [ -z "$manifest" ]; then
              echo "::error::$entry was published but npm view never returned a manifest after 6 attempts"
              exit 1
            fi
            if echo "$manifest" | grep -q "workspace:"; then
              echo "::error::$entry was published with workspace:* still in its manifest"
              exit 1
            fi
          done
