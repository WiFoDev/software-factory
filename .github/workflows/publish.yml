name: publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-pnpm
        uses: pnpm/action-setup@v4

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: install
        run: pnpm install --frozen-lockfile

      # Build must run before typecheck/test/check so cross-package
      # type resolution (e.g., harness importing @wifo/factory-core)
      # finds the workspace-linked `dist/` from a fresh checkout.
      # `--workspace-concurrency=1` forces serial builds: the
      # core ↔ spec-review hard-dep (added in v0.0.12) introduces a
      # cyclic workspace edge that prevents pnpm from determining
      # topo-order; serial gives a consistent linear walk that works.
      - name: build
        run: pnpm -r --workspace-concurrency=1 build

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test

      - name: check
        run: pnpm check

      - name: publish
        # Idempotent per-package publish: skip any package whose local
        # version is already on npm. Lets us re-tag a release (e.g., for
        # GitHub Releases page hygiene after a manual `pnpm publish`)
        # without the workflow failing on duplicate-version errors.
        run: |
          set -e
          published=0
          skipped=0
          for pkg_dir in packages/*/; do
            name=$(jq -r '.name' "${pkg_dir}package.json")
            local_version=$(jq -r '.version' "${pkg_dir}package.json")
            remote_version=$(npm view "$name" version 2>/dev/null || echo "0.0.0")
            if [ "$local_version" != "$remote_version" ]; then
              echo "::notice::Publishing $name@$local_version (registry was at $remote_version)"
              (cd "$pkg_dir" && pnpm publish --access public --no-git-checks)
              published=$((published + 1))
            else
              echo "::notice::Skipping $name@$local_version (already on npm)"
              skipped=$((skipped + 1))
            fi
          done
          echo "::notice::publish summary — published=$published skipped=$skipped"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
