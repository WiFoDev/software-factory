name: publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-pnpm
        uses: pnpm/action-setup@v4

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # bun is required for `pnpm test` (every package's test script runs
      # `bun test`) AND for `packages/core`'s build (which runs
      # `bun run scripts/emit-json-schema.ts` after tsc).
      - name: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        run: pnpm install --frozen-lockfile

      # Build must run before typecheck/test/check so cross-package
      # type resolution (e.g., harness importing @wifo/factory-core)
      # finds the workspace-linked `dist/` from a fresh checkout.
      # Explicit per-package order: pnpm treats `peerDependencies` as
      # cycle edges, so the v0.0.13 move of `@wifo/factory-spec-review`
      # to peerDeps of `@wifo/factory-core` did NOT eliminate the
      # workspace cycle from pnpm's POV (only the runtime install
      # semantic improved). `pnpm -r build` still parallelizes across
      # the cycle and races; explicit sequencing sidesteps it.
      - name: build
        run: |
          set -e
          pnpm --filter @wifo/factory-context build
          pnpm --filter @wifo/factory-twin build
          pnpm --filter @wifo/factory-core build
          pnpm --filter @wifo/factory-harness build
          pnpm --filter @wifo/factory-spec-review build
          pnpm --filter @wifo/factory-runtime build

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test

      - name: check
        run: pnpm check

      - name: publish
        # Idempotent per-package publish: skip any package whose local
        # version is already on npm. Lets us re-tag a release (e.g., for
        # GitHub Releases page hygiene after a manual `pnpm publish`)
        # without the workflow failing on duplicate-version errors.
        run: |
          set -e
          published=0
          skipped=0
          for pkg_dir in packages/*/; do
            name=$(jq -r '.name' "${pkg_dir}package.json")
            local_version=$(jq -r '.version' "${pkg_dir}package.json")
            remote_version=$(npm view "$name" version 2>/dev/null || echo "0.0.0")
            if [ "$local_version" != "$remote_version" ]; then
              echo "::notice::Publishing $name@$local_version (registry was at $remote_version)"
              # `pnpm publish -r --filter <name>` — the `-r` flag is what
              # activates the npmrc auth context (actions/setup-node writes
              # the auth token into $RUNNER_TEMP/.npmrc, but pnpm only reads
              # it under recursive-publish mode).
              pnpm publish -r --filter "$name" --access public --no-git-checks
              published=$((published + 1))
            else
              echo "::notice::Skipping $name@$local_version (already on npm)"
              skipped=$((skipped + 1))
            fi
          done
          echo "::notice::publish summary — published=$published skipped=$skipped"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
